<div class="page active" id="page-home">
  <div class="topbar">
    <div class="logo">Store<span>Uz</span></div>
    <button class="tb-btn" onclick="nav('catalog')">
      <svg width="20" height="20"><use href="#ic-search"/></svg>
    </button>
  </div>
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-pattern">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
          <rect x="0" y="0" width="200" height="200" stroke="white" stroke-width="1"/>
          <rect x="20" y="20" width="160" height="160" stroke="white" stroke-width=".5"/>
          <line x1="0" y1="100" x2="200" y2="100" stroke="white" stroke-width=".5"/>
          <line x1="100" y1="0" x2="100" y2="200" stroke="white" stroke-width=".5"/>
        </svg>
      </div>
      <div class="hero-tag">
        <svg width="12" height="12"><use href="#ic-star"/></svg>Новая коллекция
      </div>
      <div class="hero-title"><strong>Весна</strong> — Лето<br>2025</div>
      <div class="hero-sub">Скидки до 40% на избранные модели</div>
      <button class="hero-cta" onclick="nav('catalog')">
        Смотреть коллекцию
        <svg width="14" height="14"><use href="#ic-arrow-r"/></svg>
      </button>
    </div>
  </div>
  <div class="sec-hdr">
    <div class="sec-title">Категории</div>
    <div class="sec-link" onclick="nav('catalog')">Все<svg width="12" height="12"><use href="#ic-chevron-r"/></svg></div>
  </div>
  <div class="cats-row" id="home-cats"></div>
  <div class="chips" id="home-g-chips">
    <div class="chip on" onclick="homeG('',this)">Все</div>
    <div class="chip" onclick="homeG('men',this)">Мужское</div>
    <div class="chip" onclick="homeG('women',this)">Женское</div>
    <div class="chip" onclick="homeG('children',this)">Детское</div>
    <div class="chip" onclick="homeG('unisex',this)">Унисекс</div>
  </div>
  <div class="sec-hdr">
    <div class="sec-title">Рекомендуем</div>
    <div class="sec-link" onclick="nav('catalog')">Все<svg width="12" height="12"><use href="#ic-chevron-r"/></svg></div>
  </div>
  <div class="pgrid" id="home-featured"></div>
  <div class="sec-hdr">
    <div class="sec-title">Новинки</div>
    <div class="sec-link" onclick="nav('catalog')">Все<svg width="12" height="12"><use href="#ic-chevron-r"/></svg></div>
  </div>
  <div class="pgrid" id="home-new"></div>
  <div style="height:16px"></div>
</div>
